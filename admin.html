<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELAR - Админ Панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            margin-bottom: 30px;
            color: #3b82f6;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: #222;
            color: #fff;
            border: none;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            border-bottom-color: #3b82f6;
            background: #111;
        }
        
        .tab-btn:hover {
            background: #333;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border: 1px solid #333;
        }
        
        th {
            background: #1a1a1a;
            color: #3b82f6;
        }
        
        tr:hover {
            background: #1a1a1a;
        }
        
        .btn {
            padding: 8px 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .btn:hover {
            background: #2563eb;
        }
        
        .btn-danger {
            background: #ef4444;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .empty {
            padding: 20px;
            text-align: center;
            color: #888;
        }
        
        .stat {
            display: inline-block;
            background: #1a1a1a;
            padding: 15px 20px;
            margin-right: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .stat-number {
            font-size: 24px;
            color: #3b82f6;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 VELAR - Админ Панель</h1>
        
        <div class="stat">
            <div class="stat-number" id="bookingCount">0</div>
            <div class="stat-label">Бронирований</div>
        </div>
        
        <div class="stat">
            <div class="stat-number" id="reviewCount">0</div>
            <div class="stat-label">Отзывов</div>
        </div>
        
        <div class="stat">
            <div class="stat-number" id="userCount">0</div>
            <div class="stat-label">Пользователей</div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('bookings')">Бронирования</button>
            <button class="tab-btn" onclick="switchTab('reviews')">Отзывы</button>
            <button class="tab-btn" onclick="switchTab('users')">Пользователи</button>
        </div>
        
        <div id="bookings" class="tab-content active">
            <h2>Все бронирования</h2>
            <table id="bookingsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Автомобиль</th>
                        <th>Телефон</th>
                        <th>Даты</th>
                        <th>Статус</th>
                        <th>Дата</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="bookingsBody"></tbody>
            </table>
        </div>
        
        <div id="reviews" class="tab-content">
            <h2>Все отзывы</h2>
            <table id="reviewsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Автомобиль</th>
                        <th>Рейтинг</th>
                        <th>Текст</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="reviewsBody"></tbody>
            </table>
        </div>
        
        <div id="users" class="tab-content">
            <h2>Все пользователи</h2>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Email</th>
                        <th>Телефон</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="usersBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        class Database {
            constructor() {
                this.storageKey = 'velar_db';
            }

            getAll(table) {
                const db = JSON.parse(localStorage.getItem(this.storageKey) || '{"bookings":[],"users":[],"reviews":[]}');
                return db[table] || [];
            }

            delete(table, id) {
                const db = JSON.parse(localStorage.getItem(this.storageKey) || '{"bookings":[],"users":[],"reviews":[]}');
                db[table] = db[table].filter(d => d.id !== id);
                localStorage.setItem(this.storageKey, JSON.stringify(db));
            }
        }

        const db = new Database();

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            loadData();
        }

        function loadData() {
            loadBookings();
            loadReviews();
            loadUsers();
            updateStats();
        }

        function loadBookings() {
            const bookings = db.getAll('bookings');
            const tbody = document.getElementById('bookingsBody');
            tbody.innerHTML = '';

            if (bookings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty">Нет бронирований</td></tr>';
            } else {
                bookings.forEach(b => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${b.id}</td>
                            <td>${b.carName}</td>
                            <td>${b.phone}</td>
                            <td>${b.dates}</td>
                            <td>${b.status}</td>
                            <td>${new Date(b.createdAt).toLocaleDateString('ru-RU')}</td>
                            <td>
                                <button class="btn" onclick="deleteBooking(${b.id})">Удалить</button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        function loadReviews() {
            const reviews = db.getAll('reviews');
            const tbody = document.getElementById('reviewsBody');
            tbody.innerHTML = '';

            if (reviews.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">Нет отзывов</td></tr>';
            } else {
                reviews.forEach(r => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${r.id}</td>
                            <td>${r.carName}</td>
                            <td>${'⭐'.repeat(r.rating)}</td>
                            <td>${r.text}</td>
                            <td>
                                <button class="btn btn-danger" onclick="deleteReview(${r.id})">Удалить</button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        function loadUsers() {
            const users = db.getAll('users');
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">Нет пользователей</td></tr>';
            } else {
                users.forEach(u => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.id}</td>
                            <td>${u.name}</td>
                            <td>${u.email}</td>
                            <td>${u.phone}</td>
                            <td>
                                <button class="btn btn-danger" onclick="deleteUser(${u.id})">Удалить</button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        function updateStats() {
            document.getElementById('bookingCount').textContent = db.getAll('bookings').length;
            document.getElementById('reviewCount').textContent = db.getAll('reviews').length;
            document.getElementById('userCount').textContent = db.getAll('users').length;
        }

        function deleteBooking(id) {
            if (confirm('Удалить бронирование?')) {
                db.delete('bookings', id);
                loadData();
            }
        }

        function deleteReview(id) {
            if (confirm('Удалить отзыв?')) {
                db.delete('reviews', id);
                loadData();
            }
        }

        function deleteUser(id) {
            if (confirm('Удалить пользователя?')) {
                db.delete('users', id);
                loadData();
            }
        }

        // Загружаем данные при открытии страницы
        loadData();
    </script>
</body>
</html>
