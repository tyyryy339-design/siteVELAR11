<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELAR - Быстрый доступ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: #111;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
        }
        
        h1 {
            color: #3b82f6;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .qr-box {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: inline-block;
        }
        
        .qr-box img {
            width: 250px;
            height: 250px;
        }
        
        .url-section {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        
        .label {
            color: #888;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .url-text {
            background: #000;
            padding: 12px;
            border-radius: 6px;
            color: #3b82f6;
            font-weight: bold;
            font-size: 14px;
            word-break: break-all;
            border: 1px solid #3b82f6;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            background: #3b82f6;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn:hover {
            background: #60a5fa;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #222;
            color: #3b82f6;
            border: 1px solid #3b82f6;
        }
        
        .btn-secondary:hover {
            background: #333;
        }
        
        .info {
            background: #1a2332;
            border-left: 3px solid #3b82f6;
            padding: 15px;
            border-radius: 6px;
            text-align: left;
            font-size: 13px;
            color: #bbb;
            margin-top: 20px;
        }
        
        .info strong {
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 VELAR</h1>
        <p class="subtitle">Сканируй QR или открой по ссылке</p>
        
        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=http://localhost:8080" alt="QR Code">
        </div>
        
        <div class="url-section">
            <div class="label">📱 Адрес на телефоне (локальная сеть)</div>
            <div class="url-text" id="urlText">http://192.168.X.X:8080</div>
        </div>
        
        <div class="button-group">
            <button class="btn" onclick="window.location.href='index.html'">🚗 ОТКРЫТЬ САЙТ</button>
            <button class="btn btn-secondary" onclick="copyURL()">📋 КОПИРОВАТЬ ССЫЛКУ</button>
        </div>
        
        <div class="info">
            <strong>💡 Как открыть с телефона:</strong><br>
            1. Включи оба устройства в одну WiFi сеть<br>
            2. Сканируй QR код или вручную введи адрес выше<br>
            3. Готово! Сайт откроется на телефоне
        </div>
    </div>

    <script>
        // Пытаемся определить реальный IP
        function getLocalIP() {
            // Попытка получить IP через WebRTC (работает в браузере)
            const RTCPeerConnection = window.RTCPeerConnection || window.webkitRTCPeerConnection || window.mozRTCPeerConnection;
            
            if (RTCPeerConnection) {
                const rtc = new RTCPeerConnection({iceServers: []});
                
                rtc.createDataChannel('');
                rtc.createOffer().then(offer => rtc.setLocalDescription(offer)).catch(() => {});
                
                rtc.onicecandidate = (ice) => {
                    if (!ice || !ice.candidate) return;
                    
                    const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3})/;
                    const ipAddress = ipRegex.exec(ice.candidate.candidate)[1];
                    
                    if (ipAddress && !ipAddress.startsWith('127.')) {
                        document.getElementById('urlText').textContent = `http://${ipAddress}:8080`;
                        
                        // Обновляем QR код
                        const newQR = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=http://${ipAddress}:8080`;
                        document.querySelector('.qr-box img').src = newQR;
                    }
                };
            }
        }
        
        function copyURL() {
            const url = document.getElementById('urlText').textContent;
            navigator.clipboard.writeText(url).then(() => {
                alert('✅ Ссылка скопирована! Вставь её в браузер телефона.');
            });
        }
        
        // Определяем IP при загрузке
        window.addEventListener('load', () => {
            setTimeout(getLocalIP, 500);
        });
    </script>
</body>
</html>
